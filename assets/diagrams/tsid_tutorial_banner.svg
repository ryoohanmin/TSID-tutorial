<svg width="1600" height="420" viewBox="0 0 1600 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">TSID tutorial banner</title>
  <desc id="desc">Minimal banner for the TSID tutorial repository.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="40" x2="1480" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1F33"/>
      <stop offset="1" stop-color="#123C5C"/>
    </linearGradient>
    <linearGradient id="accent" x1="230" y1="80" x2="1390" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#36C2A4" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#F2C94C" stop-opacity="0.18"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1600" height="420" rx="32" fill="url(#bg)"/>
  <rect x="40" y="40" width="1520" height="340" rx="24" fill="url(#accent)" opacity="0.85"/>

  <g opacity="0.18">
    <circle cx="1220" cy="116" r="96" fill="#9DD9FF"/>
    <circle cx="1360" cy="288" r="132" fill="#36C2A4"/>
    <circle cx="180" cy="286" r="110" fill="#F2C94C"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="88" y="84" width="680" height="252" rx="26" fill="#F8FBFF" fill-opacity="0.96"/>
  </g>

  <text x="130" y="170" fill="#0B1F33" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" letter-spacing="0.12em">TSID TUTORIAL</text>
  <text x="130" y="232" fill="#0B1F33" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="68" font-weight="800">From task to walking</text>
  <text x="130" y="282" fill="#33556F" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="500">
    ex_0 -> ex_1_ur5 -> ex_2 -> ex_3 -> ex_4
  </text>

  <g transform="translate(980 118)">
    <rect x="0" y="0" width="400" height="184" rx="26" fill="#081828" fill-opacity="0.45" stroke="#9DD9FF" stroke-opacity="0.28"/>
    <path d="M54 46H346" stroke="#9DD9FF" stroke-opacity="0.55" stroke-width="4" stroke-linecap="round"/>
    <path d="M54 92H276" stroke="#36C2A4" stroke-opacity="0.75" stroke-width="4" stroke-linecap="round"/>
    <path d="M54 138H318" stroke="#F2C94C" stroke-opacity="0.8" stroke-width="4" stroke-linecap="round"/>
    <circle cx="54" cy="46" r="10" fill="#9DD9FF"/>
    <circle cx="346" cy="46" r="10" fill="#9DD9FF"/>
    <circle cx="54" cy="92" r="10" fill="#36C2A4"/>
    <circle cx="276" cy="92" r="10" fill="#36C2A4"/>
    <circle cx="54" cy="138" r="10" fill="#F2C94C"/>
    <circle cx="318" cy="138" r="10" fill="#F2C94C"/>
  </g>

  <text x="982" y="340" fill="#D9E8F2" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="500" opacity="0.95">
    Task space inverse dynamics study notes for robotics learners
  </text>
</svg>
