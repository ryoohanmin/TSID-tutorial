<svg width="1400" height="320" viewBox="0 0 1400 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">TSID learning flow</title>
  <desc id="desc">Flow diagram from ex_0 to ex_4 for the TSID tutorial repository.</desc>
  <defs>
    <linearGradient id="panel" x1="80" y1="20" x2="1320" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F7FAFC"/>
      <stop offset="1" stop-color="#EAF2F8"/>
    </linearGradient>
    <linearGradient id="cardA" x1="0" y1="0" x2="0" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D8F3EA"/>
      <stop offset="1" stop-color="#BFEBD9"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0" y1="0" x2="0" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#DCEBFF"/>
      <stop offset="1" stop-color="#C8DBFF"/>
    </linearGradient>
    <linearGradient id="cardC" x1="0" y1="0" x2="0" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FCE7C8"/>
      <stop offset="1" stop-color="#F7D29A"/>
    </linearGradient>
    <linearGradient id="cardD" x1="0" y1="0" x2="0" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F2DDF3"/>
      <stop offset="1" stop-color="#E2C3E5"/>
    </linearGradient>
    <linearGradient id="cardE" x1="0" y1="0" x2="0" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E0E7FF"/>
      <stop offset="1" stop-color="#C7D2FE"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0A1E33" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4B637A"/>
    </marker>
  </defs>

  <rect width="1400" height="320" rx="28" fill="url(#panel)"/>
  <text x="700" y="42" text-anchor="middle" fill="#10243A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">TSID learning flow</text>
  <text x="700" y="68" text-anchor="middle" fill="#526A80" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="500">From joint tracking to walking control</text>

  <g filter="url(#shadow)">
    <rect x="70" y="118" width="168" height="118" rx="22" fill="url(#cardA)"/>
    <rect x="310" y="118" width="168" height="118" rx="22" fill="url(#cardB)"/>
    <rect x="550" y="118" width="168" height="118" rx="22" fill="url(#cardC)"/>
    <rect x="790" y="118" width="168" height="118" rx="22" fill="url(#cardD)"/>
    <rect x="1030" y="118" width="168" height="118" rx="22" fill="url(#cardE)"/>
  </g>

  <path d="M238 177H310" stroke="#4B637A" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M478 177H550" stroke="#4B637A" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M718 177H790" stroke="#4B637A" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M958 177H1030" stroke="#4B637A" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <text x="154" y="160" text-anchor="middle" fill="#0F2B22" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">ex_0</text>
  <text x="154" y="192" text-anchor="middle" fill="#0F2B22" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="600">joint-space</text>

  <text x="394" y="160" text-anchor="middle" fill="#0C2444" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">ex_1_ur5</text>
  <text x="394" y="192" text-anchor="middle" fill="#0C2444" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="600">end-effector</text>

  <text x="634" y="160" text-anchor="middle" fill="#4D3400" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">ex_2</text>
  <text x="634" y="192" text-anchor="middle" fill="#4D3400" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="600">CoM tracking</text>

  <text x="874" y="160" text-anchor="middle" fill="#4A2450" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">ex_3</text>
  <text x="874" y="192" text-anchor="middle" fill="#4A2450" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="600">interactive balance</text>

  <text x="1114" y="160" text-anchor="middle" fill="#1E2C6B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">ex_4</text>
  <text x="1114" y="192" text-anchor="middle" fill="#1E2C6B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="600">walking pipeline</text>

  <text x="700" y="278" text-anchor="middle" fill="#6B7F92" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="500">
    task -> contact -> planning -> whole-body control
  </text>
</svg>
